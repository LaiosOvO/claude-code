    - 入口系统: modules/01-entrypoints.md
    - 对话引擎: modules/02-query-engine.md
    - 工具系统: modules/03-tool-system.md
    - 远程桥接: modules/04-bridge.md
    - 状态管理: modules/05-state.md
  - 阅读笔记:
