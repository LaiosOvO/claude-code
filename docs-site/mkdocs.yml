site_name: Claude Code Best 源码学习站
site_description: Claude Code Best (ccb) 源码深度解读与学习笔记
site_url: ""
repo_url: https://github.com/LaiosOvO/claude-code
repo_name: claude-code

theme:
  name: material
  language: zh
  font:
    text: Noto Sans SC
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow
  icon:
    repo: fontawesome/brands/github
    logo: material/code-braces

plugins:
  - search:
      separator: '[\s\u200b\-]'
      jieba_dict: null
      lang:
        - zh
        - en

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      repo_url_shorthand: true
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/LaiosOvO/claude-code
  generator: false

extra_css:
  - stylesheets/extra.css

nav:
  - 首页: index.md
  - 启动流程详解: startup-flow.md
  - 自顶向下教程:
    - tutorial/top-down/index.md
    - 第一章 全局架构鸟瞰: tutorial/top-down/01-architecture-overview.md
    - 第二章 启动链路详解: tutorial/top-down/02-bootstrap-chain.md
    - 第三章 对话引擎: tutorial/top-down/03-query-engine.md
    - 第四章 工具系统: tutorial/top-down/04-tool-system.md
    - 第五章 终端UI系统: tutorial/top-down/05-terminal-ui.md
  - 自底向上教程:
    - tutorial/bottom-up/index.md
    - 第一章 基础原语: tutorial/bottom-up/01-fundamentals.md
    - 第二章 核心抽象: tutorial/bottom-up/02-core-abstractions.md
    - 第三章 模块组装: tutorial/bottom-up/03-module-assembly.md
    - 第四章 系统集成: tutorial/bottom-up/04-system-integration.md
    - 第五章 全景视角: tutorial/bottom-up/05-full-picture.md
  - 模块说明:
